<div class="w-full max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-gray-100 font-sans mt-4">
  <h3 class="text-2xl font-bold text-gray-900 mb-6">Demanar pressupost</h3>
  
  <form [formGroup]="userForm" (ngSubmit)="submitForm()" class="flex flex-col md:flex-row gap-4 items-center">
    
    <div class="w-full">
      <input 
        type="text" 
        formControlName="name"
        placeholder="Nom i Cognom" 
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent placeholder-gray-400 text-gray-700"
      />
    </div>

    <div class="w-full">
      <input 
        type="tel" 
        formControlName="phone"
        placeholder="Telèfon" 
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent placeholder-gray-400 text-gray-700"
      />
    </div>

    <div class="w-full">
      <input 
        type="email" 
        formControlName="email"
        placeholder="Email" 
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent placeholder-gray-400 text-gray-700"
      />
    </div>

    <button 
      type="submit" 
      [disabled]="userForm.invalid"
      class="w-full md:w-auto whitespace-nowrap bg-pink-500 hover:bg-pink-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors"
    >
      Sol·licitar pressupost →
    </button>
  </form>
</div>
