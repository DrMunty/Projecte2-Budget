<div class="w-full flex justify-center pt-80 pb-8 p-4 font-sans"> 
    <div class="group relative w-full max-w-4xl bg-[#f9f9f7] rounded-4xl shadow-md p-10 min-h-45 flex flex-col justify-center gap-6  border"
    [class.border-2]="showExtraOptions()"
    [class.border-pink-500]="showExtraOptions()"
    [class.border-0]="!showExtraOptions()">
        <div class="grid grid-cols-3 items-center w-full gap-4">

            <div>
            <h1 class="text-3xl font-extrabold text-[#111111] tracking-tight text-left">
                {{myDashboard().title}}
              
            </h1>
            <p class="text-sm font-semibold text-gray-500 mt-2 max-w-70 leading-snug text-left tracking-wide"> 
                {{myDashboard().description}}
            </p>
        </div>

        <div class="text-center">
            <h1 class="text-4xl md:text-5xl font-black text-[#111111] tracking-tight"> 
                {{myDashboard().price}}<span class="text-2xl font-extrabold ml-1">€</span>
            </h1>
        </div>

        <div class="justify-self-end mt-4">
            <app-checkbox (changed)="onServiceToggle($event)"></app-checkbox>
        </div>
    </div>

    @if (showExtraOptions()) {
            <div class="w-full flex flex-col items-end gap-3 pt-4 border-t border-gray-200/60 animate-fade-in">
                
                <div class="flex items-center gap-4">
                    <span class="text-sm font-bold text-gray-700">Nombre de pàgines</span>
                    <div class="flex items-center gap-2">
                        <button (click)="changeQuantity('pages', -1)" class="w-6 h-6 flex items-center justify-center rounded-full border border-gray-300 text-gray-400 hover:bg-gray-200 text-sm font-bold">-</button>
                        <div class="w-14 h-9 bg-white border border-gray-300 rounded-xl flex items-center justify-center font-extrabold text-sm shadow-sm">{{ pageNum() }}</div>
                        <button (click)="changeQuantity('pages', 1)" class="w-6 h-6 flex items-center justify-center rounded-full border border-gray-300 text-gray-400 hover:bg-gray-200 text-sm font-bold">+</button>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <span class="text-sm font-bold text-gray-700">Nombre de llenguatges</span>
                    <div class="flex items-center gap-2">
                        <button data-test-id= "button-pages-minus"(click)="changeQuantity('languages', -1)" class="w-6 h-6 flex items-center justify-center rounded-full border border-gray-300 text-gray-400 hover:bg-gray-200 text-sm font-bold">-</button>
                        <div data-test-id= "pages-quantity"class="w-14 h-9 bg-white border border-gray-300 rounded-xl flex items-center justify-center font-extrabold text-sm shadow-sm">{{ languageNum() }}</div>
                        <button data-test-id= "button-pages-plus" (click)="changeQuantity('languages', 1)" class="w-6 h-6 flex items-center justify-center rounded-full border border-gray-300 text-gray-400 hover:bg-gray-200 text-sm font-bold">+</button>
                    </div>
                </div>

            </div>
        }
    </div>

</div>
