<header class="w-full flex justify-center pt-16 pb-20 p-4" role="banner" aria-labelledby="hero-heading">

    <div class="group relative w-full max-w-4xl bg-[#f9f9f7] rounded-[2.5rem] p-12 shadow-sm overflow-hidden flex justify-center items-center min-h-60 transition-all duration-500 ease-out hover:shadow-md hover:scale-[1.01]">

        <div class="absolute inset-0 opacity-40 bg-[radial-gradient(#e5e7eb_1.5px,transparent_1.5px)] [bg-size:24px_24px] transition-transform duration-700 ease-out group-hover:scale-110 pointer-events-none" aria-hidden="true"></div>
        
        <div class="absolute top-6 left-8 text-2xl select-none transition-all duration-300 group-hover:animate-float-hover" aria-hidden="true">
            <svg class="w-6 h-6 text-[#f25c05] filter drop-shadow-sm" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
        </div>

        <div class="absolute top-6 right-8 text-xl select-none transition-all duration-300 group-hover:animate-float-hover" aria-hidden="true">
            <svg class="w-6 h-6 text-gray-400 opacity-60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false">
                <path d="M6 19c2.5-1 4.5-4 5-7s-.5-6-3-5-4 4-2 7 5 3 7 0 1-6-2-7-4 4-2 7 6 2 8-2"/>
            </svg>
        </div>

        <div class="absolute -bottom-4 -left-4 w-28 h-28 transition-all duration-500 ease-out group-hover:translate-x-1 group-hover:-translate-y-1 pointer-events-none" aria-hidden="true">
            <div class = "w-full h-full group-hover:animate-float-hover">
                <svg class="w-full h-full text-[#f1c453]" viewBox="0 0 100 100" fill="currentColor" aria-hidden="true" focusable="false">
                    <path d="M0,40 Q30,40 50,70 T100,100 L0,100 Z"/>
                    <circle cx="15" cy="75" r="1.5" fill="white" opacity="0.6"/>
                    <circle cx="25" cy="65" r="1.5" fill="white" opacity="0.6"/>
                    <circle cx="35" cy="80" r="1.5" fill="white" opacity="0.6"/>
                    <circle cx="20" cy="85" r="1.5" fill="white" opacity="0.6"/>
                </svg>
            </div>
        </div>

        <div class="absolute -bottom-2 right-12 w-24 h-16 transition-all duration-500 ease-out group-hover:rotate-6 pointer-events-none" aria-hidden="true">
            <div class="w-full h-full group-hover:animate-float-hover">
                <svg class="w-full h-full text-[#3a8b5c]" viewBox="0 0 100 60" fill="currentColor" aria-hidden="true" focusable="false">
                    <path d="M0,60 Q30,10 70,20 T100,60 Z"/>
                    <path d="M20,60 L40,15 M35,60 L55,20 M50,60 L70,25 M65,60 L85,35" stroke="#1e4e32" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
                </svg>
            </div>
        </div>

        <h1 id="hero-heading" class="relative z-10 text-3xl md:text-4xl font-extrabold text-[#111111] text-center tracking-tight transition-colors duration-300 group-hover:text-black">
            Aconsegueix la millor qualitat
        </h1>
    </div>
</header>
